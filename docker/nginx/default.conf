# =====================================
# CDC POLTEKAPP - NGINX CONFIG
# Laravel + PHP-FPM + Docker
# Reverse Proxy: IIS
# =====================================

# -------------------------------------------------
# GLOBAL: MICROCACHE
# -------------------------------------------------
fastcgi_cache_path /tmp/nginx_cache levels=1:2 keys_zone=laravel_cache:100m inactive=60m;
fastcgi_cache_key "$scheme$request_method$host$request_uri";

# Bypass cache untuk method non-GET
map $request_method $no_cache {
    default 0;
    POST    1;
    PUT     1;
    DELETE  1;
    PATCH   1;
}

# Bypass cache jika ada session Laravel
map $http_cookie $skip_cache {
    default 0;
    ~laravel_session 1;
}

# -------------------------------------------------
# GLOBAL: RATE LIMIT
# -------------------------------------------------
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# -------------------------------------------------
# GLOBAL: CONNECTION LIMIT
# -------------------------------------------------
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;


server {

    # -------------------------------------------------
    # BASIC
    # -------------------------------------------------
    listen 80;
    server_name _;

    root /var/www/public;
    index index.php index.html;

    client_max_body_size 50M;


    # -------------------------------------------------
    # PERFORMANCE
    # -------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;


    # -------------------------------------------------
    # REAL IP (IIS Reverse Proxy)
    # -------------------------------------------------
    real_ip_header X-Forwarded-For;
    set_real_ip_from 127.0.0.1;
    real_ip_recursive on;


    # -------------------------------------------------
    # SECURITY HEADERS
    # -------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;


    # -------------------------------------------------
    # CONNECTION / REQUEST PROTECTION
    # -------------------------------------------------
    limit_conn conn_limit 20;

    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    client_header_buffer_size 1k;
    large_client_header_buffers 2 2k;


    # -------------------------------------------------
    # MAIN ROUTING (Laravel Front Controller)
    # -------------------------------------------------
    location / {
        limit_req zone=api_limit burst=60 nodelay;
        try_files $uri $uri/ /index.php$is_args$args;
    }


    # -------------------------------------------------
    # LOGIN RATE LIMIT
    # -------------------------------------------------
    location ~* ^/(login|admin/login) {
        limit_req zone=login_limit burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }


    # -------------------------------------------------
    # PHP-FPM HANDLER
    # -------------------------------------------------
    location ~ ^/index\.php(/|$) {

        fastcgi_pass app:9000;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        fastcgi_param HTTP_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;

        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
        fastcgi_busy_buffers_size 64k;

        # Microcache
        set $skip_cache_uri 0;
        if ($request_uri ~* "/login|/admin|/api") {
            set $skip_cache_uri 1;
        }

        # fastcgi_cache laravel_cache;
        # fastcgi_cache_valid 200 5s;

        # fastcgi_cache_bypass $no_cache $skip_cache $skip_cache_uri;
        # fastcgi_no_cache $no_cache $skip_cache $skip_cache_uri;

        add_header X-Cache $upstream_cache_status always;

        fastcgi_read_timeout 60s;
    }


    # -------------------------------------------------
    # BLOCK DIRECT PHP ACCESS
    # -------------------------------------------------
    location ~ \.php$ {
        return 404;
    }


    # -------------------------------------------------
    # PROTECT HIDDEN FILES
    # -------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }


    # -------------------------------------------------
    # STATIC FILE CACHE
    # -------------------------------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }


    # -------------------------------------------------
    # LOG CLEANUP
    # -------------------------------------------------
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

}