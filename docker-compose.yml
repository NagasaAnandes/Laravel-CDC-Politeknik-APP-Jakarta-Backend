version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cdc_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - cdc-network

  web:
    image: nginx:alpine
    container_name: cdc_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - cdc-network

  db:
    image: mysql:8.0
    container_name: cdc_db
    environment:
      MYSQL_DATABASE: cdc_db
      MYSQL_USER: cdc_user
      MYSQL_PASSWORD: cdc_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - cdc-db-data:/var/lib/mysql
    networks:
      - cdc-network

networks:
  cdc-network:

volumes:
  cdc-db-data:
