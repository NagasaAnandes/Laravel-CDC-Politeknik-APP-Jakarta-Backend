services:
  # =====================================
  # Laravel PHP-FPM Application
  # =====================================
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cdc_app
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - db
      - redis
    expose:
      - "9000"
    volumes:
      - ./src:/var/www
    networks:
      - cdc-network
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================
  # Nginx Web Server
  # =====================================
  web:
    image: nginx:alpine
    container_name: cdc_web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cdc-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================
  # MySQL Database
  # =====================================
  db:
    image: mysql:8.0
    container_name: cdc_db
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - cdc-db-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - cdc-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "productionhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =====================================
  # Redis (Session / Cache / Queue)
  # =====================================
  redis:
    image: redis:7-alpine
    container_name: cdc_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - cdc-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================
  # Laravel Queue Worker
  # =====================================
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cdc_queue
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - redis
      - db
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./src:/var/www
    networks:
      - cdc-network
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================
  # Laravel Scheduler
  # =====================================
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cdc_scheduler
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - db
      - redis
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - ./src:/var/www
    networks:
      - cdc-network
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

# =====================================
# Docker Network
# =====================================
networks:
  cdc-network:
    driver: bridge

# =====================================
# Persistent Volumes
# =====================================
volumes:
  cdc-db-data:
  redis-data:
