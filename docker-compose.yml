version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cdc_app
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "9000"
    depends_on:
      - db
    networks:
      - cdc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: nginx:alpine
    container_name: cdc_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/src
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - cdc-network

  db:
    image: mysql:8.0
    container_name: cdc_db
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - cdc-db-data:/var/lib/mysql
    networks:
      - cdc-network

networks:
  cdc-network:
    driver: bridge

volumes:
  cdc-db-data:
