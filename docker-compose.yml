services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cdc_app
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - db
    expose:
      - "9000"
    volumes:
      - ./src:/var/www
    networks:
      - cdc-network

  web:
    image: nginx:alpine
    container_name: cdc_web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cdc-network

  db:
    image: mysql:8.0
    container_name: cdc_db
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "3307:3306"
    volumes:
      - cdc-db-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - cdc-network

networks:
  cdc-network:
    driver: bridge

volumes:
  cdc-db-data:
